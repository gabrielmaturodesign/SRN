<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg class="sidebar-logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
      <span class="sidebar-logo-text">Meeting Room</span>
    </div>
    <nav class="nav">
      <button class="nav-item active" id="nav-calendar" onclick="showView('calendar')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Calendario
      </button>
      <button class="nav-item" id="nav-bookings" onclick="showView('my-bookings')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Le mie prenotazioni
      </button>
    </nav>
    <div class="sidebar-bottom">
      <button class="nav-item" id="nav-admin" style="display:none" onclick="window.location.href='/admin.html'">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Pannello Admin
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left" id="topbar-left">
        <div class="nav-arrows">
          <button class="arrow-btn" onclick="calNav('prev')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button class="arrow-btn" onclick="calNav('next')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
        <span class="current-month" id="month-label">—</span>
        <button class="today-btn" onclick="calNav('today')">Today</button>
      </div>
      <div class="topbar-right">
        <div class="view-tabs" id="view-tabs">
          <button class="view-tab" onclick="setCalView('timeGridDay')">Day</button>
          <button class="view-tab" onclick="setCalView('timeGridWeek')">Week</button>
          <button class="view-tab active" onclick="setCalView('dayGridMonth')">Month</button>
          <button class="view-tab" onclick="setCalView('listWeek')">List</button>
        </div>
        <button class="new-btn" onclick="openBookingModal()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Nuova Prenotazione
        </button>
        <div class="user-area">
          <div class="avatar-circle" id="user-avatar">?</div>
          <button class="logout-btn" onclick="doLogout()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            Logout
          </button>
        </div>
      </div>
    </div>

    <!-- Calendar view -->
    <div id="view-calendar" class="cal-wrap">
      <div id="calendar" style="height:100%"></div>
    </div>

    <!-- My bookings view -->
    <div id="view-my-bookings" class="bookings-wrap" style="display:none">
      <div id="bookings-list"></div>
    </div>

  </div>
</div>

<!-- Modal: Nuova prenotazione -->
<div id="booking-modal" class="overlay" style="display:none" onclick="if(event.target===this) closeBookingModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nuova Prenotazione</span>
      <button class="modal-close" onclick="closeBookingModal()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="booking-error" class="err-msg"></div>
      <div class="field">
        <label class="field-label">Titolo riunione *</label>
        <input type="text" id="b-title" class="input" placeholder="es. Stand-up mattutino" />
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">Sala *</label>
          <select id="b-room" class="input"><option value="">Seleziona sala…</option></select>
        </div>
        <div class="field">
          <label class="field-label">Data *</label>
          <input type="date" id="b-date" class="input" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">Ora inizio *</label>
          <input type="time" id="b-start" class="input" value="09:00" />
        </div>
        <div class="field">
          <label class="field-label">Ora fine *</label>
          <input type="time" id="b-end" class="input" value="10:00" />
        </div>
      </div>
      <div class="field">
        <label class="field-label">Note</label>
        <textarea id="b-notes" class="input" rows="2" style="resize:none" placeholder="Informazioni aggiuntive…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeBookingModal()">Annulla</button>
      <button class="btn-confirm" id="submit-btn" onclick="submitBooking()">Prenota</button>
    </div>
  </div>
</div>

<!-- Modal: Dettaglio evento -->
<div id="detail-modal" class="overlay" style="display:none" onclick="if(event.target===this) closeDetailModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="detail-title">—</span>
      <button class="modal-close" onclick="closeDetailModal()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer" id="detail-footer"></div>
  </div>
</div>

<script>
  // ── Supabase config ──────────────────────────────────────────────────────
  const SUPABASE_URL      = 'https://sjajyvhedybsvspzuuhh.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqYWp5dmhlZHlic3ZzcHp1dWhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NjUzMTIsImV4cCI6MjA5NzQ0MTMxMn0.LdY_mZRycnNzsxyhUAdOXMPJRuKJDePm9ioFyNrdK7A';
  // ────────────────────────────────────────────────────────────────────────

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null, currentProfile = null, rooms = [], calendar;

  // ── Init ─────────────────────────────────────────────────────────────────
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '/'; return; }
    currentUser = session.user;
    const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = profile;
    const initials = (profile?.name || currentUser.email).slice(0,2).toUpperCase();
    document.getElementById('user-avatar').textContent = initials;
    if (profile?.role === 'admin') document.getElementById('nav-admin').style.display = '';
    await loadRooms();
    initCalendar();
    document.getElementById('b-date').value = new Date().toISOString().slice(0,10);
  }

  async function getToken() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '/'; return null; }
    return session.access_token;
  }

  async function apiFetch(url, opts = {}) {
    const token = await getToken(); if (!token) return;
    const res = await fetch(url, { ...opts, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) } });
    if (res.status === 401) { doLogout(); return; }
    return res;
  }

  // ── Rooms ─────────────────────────────────────────────────────────────────
  async function loadRooms() {
    const res = await apiFetch('/api/rooms');
    rooms = await res.json();
    document.getElementById('b-room').innerHTML = '<option value="">Seleziona sala…</option>' +
      rooms.map(r => `<option value="${r.id}">${r.name} (${r.capacity} posti)</option>`).join('');
  }

  // ── Calendar ──────────────────────────────────────────────────────────────
  function initCalendar() {
    calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
      locale: 'it', initialView: 'dayGridMonth',
      headerToolbar: false,
      slotMinTime: '07:00:00', slotMaxTime: '21:00:00',
      allDaySlot: false, height: '100%',
      events: fetchEvents,
      eventClick: info => showEventDetail(info.event),
      dateClick: info => { openBookingModal(); document.getElementById('b-date').value = info.dateStr.substring(0,10); },
      datesSet: info => {
        const d = info.view.currentStart;
        document.getElementById('month-label').textContent =
          d.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' })
           .replace(/^\w/, c => c.toUpperCase());
        updateViewTabs(info.view.type);
      },
      eventTimeFormat: { hour: '2-digit', minute: '2-digit', meridiem: false, hour12: false }
    });
    calendar.render();
  }

  async function fetchEvents(info, success, failure) {
    try {
      const params = new URLSearchParams({ date_from: info.startStr.substring(0,10), date_to: info.endStr.substring(0,10) });
      const res = await apiFetch(`/api/bookings?${params}`);
      const bookings = await res.json();
      success(bookings.map(b => ({
        id: b.id, title: `${b.start_time.substring(0,5)} ${b.title}`,
        start: `${b.date}T${b.start_time}`, end: `${b.date}T${b.end_time}`,
        backgroundColor: b.room_color + '22', borderColor: b.room_color,
        textColor: b.room_color,
        extendedProps: { booking: b }
      })));
    } catch(e) { failure(e); }
  }

  function calNav(action) {
    if (action === 'prev') calendar.prev();
    else if (action === 'next') calendar.next();
    else calendar.today();
  }

  function setCalView(view) {
    calendar.changeView(view);
    updateViewTabs(view);
    const isCalView = true;
    document.getElementById('topbar-left').style.display = '';
    document.getElementById('view-tabs').style.display = '';
  }

  function updateViewTabs(viewType) {
    const map = { dayGridMonth: 2, timeGridWeek: 1, timeGridDay: 0, listWeek: 3 };
    document.querySelectorAll('.view-tab').forEach((btn, i) => {
      btn.classList.toggle('active', i === (map[viewType] ?? 2));
    });
  }

  // ── Event detail ──────────────────────────────────────────────────────────
  function showEventDetail(event) {
    const b = event.extendedProps.booking;
    document.getElementById('detail-title').textContent = b.title;
    document.getElementById('detail-body').innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;color:var(--heading)">
        <span class="room-dot" style="background:${b.room_color}"></span>
        <strong>${b.room_name}</strong>
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;color:var(--body)">
        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        ${formatDate(b.date)}
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;color:var(--body)">
        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        ${b.start_time.substring(0,5)} – ${b.end_time.substring(0,5)}
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;color:var(--body)">
        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        ${b.user_name}
      </div>
      ${b.notes ? `<div style="background:#f9fafb;border-radius:8px;padding:10px 12px;font-size:13px;color:var(--body);font-style:italic">${b.notes}</div>` : ''}`;
    const canDelete = currentUser?.id === b.user_id || currentProfile?.role === 'admin';
    document.getElementById('detail-footer').innerHTML = canDelete
      ? `<button class="btn-cancel" onclick="closeDetailModal()">Chiudi</button>
         <button class="btn-danger" onclick="deleteBooking(${b.id})">Elimina prenotazione</button>`
      : `<button class="btn-confirm" onclick="closeDetailModal()">Chiudi</button>`;
    document.getElementById('detail-modal').style.display = 'flex';
  }

  function closeDetailModal() { document.getElementById('detail-modal').style.display = 'none'; }

  async function deleteBooking(id) {
    if (!confirm('Eliminare questa prenotazione?')) return;
    const res = await apiFetch(`/api/bookings/${id}`, { method: 'DELETE' });
    if (res.ok) {
      closeDetailModal(); calendar.refetchEvents();
      if (document.getElementById('view-my-bookings').style.display !== 'none') loadMyBookings();
      showToast('Prenotazione eliminata', 'success');
    } else { const d = await res.json(); showToast(d.error || 'Errore', 'error'); }
  }

  // ── My bookings ───────────────────────────────────────────────────────────
  async function loadMyBookings() {
    const res = await apiFetch('/api/bookings/mine');
    const bookings = await res.json();
    const container = document.getElementById('bookings-list');
    if (!bookings.length) {
      container.innerHTML = `<div class="empty-state"><div style="font-size:32px">📅</div><p>Nessuna prenotazione ancora</p></div>`;
      return;
    }
    const today = new Date().toISOString().slice(0,10);
    const future = bookings.filter(b => b.date >= today);
    const past   = bookings.filter(b => b.date < today);
    let html = '';
    if (future.length) {
      html += `<div class="section-label">Prossime</div>`;
      html += future.map(b => bookingItem(b)).join('');
    }
    if (past.length) {
      html += `<div class="section-label">Passate</div>`;
      html += past.map(b => bookingItem(b, false)).join('');
    }
    container.innerHTML = html;
  }

  function bookingItem(b, canDelete = true) {
    return `<div class="booking-item" style="border-left-color:${b.room_color}">
      <div class="booking-info">
        <div class="booking-title">${b.title}</div>
        <div class="booking-meta">
          <span><span class="room-dot" style="background:${b.room_color}"></span>${b.room_name}</span>
          <span>${formatDate(b.date)}</span>
          <span>${b.start_time.substring(0,5)} – ${b.end_time.substring(0,5)}</span>
        </div>
        ${b.notes ? `<div style="font-size:12px;color:var(--subtle);font-style:italic;margin-top:2px">${b.notes}</div>` : ''}
      </div>
      ${canDelete ? `<button class="delete-btn" onclick="deleteBooking(${b.id})"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>` : ''}
    </div>`;
  }

  // ── Booking modal ─────────────────────────────────────────────────────────
  function openBookingModal() { document.getElementById('booking-error').style.display = 'none'; document.getElementById('booking-modal').style.display = 'flex'; }
  function closeBookingModal() { document.getElementById('booking-modal').style.display = 'none'; }

  async function submitBooking() {
    const title    = document.getElementById('b-title').value.trim();
    const room_id  = document.getElementById('b-room').value;
    const date     = document.getElementById('b-date').value;
    const start_time = document.getElementById('b-start').value;
    const end_time   = document.getElementById('b-end').value;
    const notes    = document.getElementById('b-notes').value.trim();
    const errEl = document.getElementById('booking-error');
    errEl.style.display = 'none';
    if (!title || !room_id || !date || !start_time || !end_time) {
      errEl.textContent = 'Compila tutti i campi obbligatori.'; errEl.style.display = 'block'; return;
    }
    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Prenotazione in corso…'; btn.disabled = true;
    try {
      const res = await apiFetch('/api/bookings', { method: 'POST', body: JSON.stringify({ room_id: parseInt(room_id), title, date, start_time, end_time, notes }) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      closeBookingModal(); calendar.refetchEvents();
      if (document.getElementById('view-my-bookings').style.display !== 'none') loadMyBookings();
      showToast('Prenotazione creata! 🎉', 'success');
      document.getElementById('b-title').value = ''; document.getElementById('b-notes').value = '';
    } catch(err) { errEl.textContent = err.message; errEl.style.display = 'block'; }
    finally { btn.textContent = 'Prenota'; btn.disabled = false; }
  }

  // ── Navigation ────────────────────────────────────────────────────────────
  function showView(view) {
    const isCalendar = view === 'calendar';
    document.getElementById('view-calendar').style.display    = isCalendar ? '' : 'none';
    document.getElementById('view-my-bookings').style.display = !isCalendar ? '' : 'none';
    document.getElementById('topbar-left').style.display      = isCalendar ? '' : 'none';
    document.getElementById('view-tabs').style.display        = isCalendar ? '' : 'none';
    document.getElementById('nav-calendar').classList.toggle('active', isCalendar);
    document.getElementById('nav-bookings').classList.toggle('active', !isCalendar);
    if (!isCalendar) loadMyBookings();
    else setTimeout(() => calendar.updateSize(), 50);
  }

  // ── Utils ─────────────────────────────────────────────────────────────────
  function formatDate(d) { return new Date(d+'T12:00:00').toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'long'}); }

  function showToast(msg, type = 'success') {
    const el = document.createElement('div'); el.className = `toast toast-${type}`; el.textContent = msg;
    document.body.appendChild(el); setTimeout(() => el.remove(), 3000);
  }

  async function doLogout() { await sb.auth.signOut(); window.location.href = '/'; }

  init();
</script>
</body>
</html>
