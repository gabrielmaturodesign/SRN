<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prenotazioni Sale Riunioni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --color-brand:#1447e6; --color-brand-strong:#1c398e; --color-brand-softer:#eef6ff;
      --color-brand-subtle:#bedbff; --color-text-heading:#101828; --color-text-body:#4a5565;
      --color-border:#e5e7eb;
      --shadow:0 1px 3px 0 rgba(29,41,61,.10),0 1px 2px -1px rgba(29,41,61,.10);
      --shadow-lg:0 4px 6px -1px rgba(0,0,0,.05),0 10px 15px -3px rgba(0,0,0,.10);
      --shadow-xl:0 20px 25px -5px rgba(29,41,61,.10),0 8px 10px -6px rgba(29,41,61,.10);
    }
    * { font-family:'Inter',system-ui,sans-serif; }
    body { background:#f3f4f6; color:var(--color-text-body); }
    .sidebar { background:linear-gradient(180deg,var(--color-brand-strong) 0%,var(--color-text-heading) 100%); }
    .nav-item { transition:all .2s; border-radius:10px; }
    .nav-item:hover { background:rgba(255,255,255,.10); }
    .nav-item.active { background:rgba(20,71,230,.30); }
    .card { background:white; border-radius:14px; box-shadow:var(--shadow); border:1px solid var(--color-border); }
    :root { --fc-today-bg-color:var(--color-brand-softer); }
    .fc { font-family:'Inter',system-ui,sans-serif; }
    .fc-toolbar-title { font-size:1rem!important; font-weight:700!important; color:var(--color-text-heading)!important; }
    .fc-button { background:var(--color-brand)!important; border-color:var(--color-brand)!important; border-radius:8px!important; font-size:.78rem!important; font-weight:500!important; }
    .fc-button:hover { background:var(--color-brand-strong)!important; border-color:var(--color-brand-strong)!important; }
    .fc-button-active { background:var(--color-brand-strong)!important; border-color:var(--color-brand-strong)!important; }
    .fc-event { border-radius:6px!important; font-size:.76rem!important; padding:2px 5px!important; border:none!important; cursor:pointer; font-weight:500!important; }
    .fc-daygrid-event { margin:1px 2px!important; }
    .fc-day-today .fc-daygrid-day-number { color:var(--color-brand)!important; font-weight:700!important; }
    .input-field { border:1.5px solid var(--color-border); border-radius:10px; padding:10px 14px; width:100%; font-size:.875rem; color:var(--color-text-heading); transition:border-color .2s,box-shadow .2s; background:white; }
    .input-field:focus { outline:none; border-color:var(--color-brand); box-shadow:0 0 0 3px rgba(20,71,230,.12); }
    .modal-overlay { background:rgba(16,24,40,.55); backdrop-filter:blur(4px); }
    @keyframes slideUp { from{opacity:0;transform:translateY(-12px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    .modal-content { animation:slideUp .2s ease; }
    .toast { position:fixed; bottom:24px; right:24px; z-index:9999; border-radius:12px; padding:13px 20px; font-size:.875rem; font-weight:500; box-shadow:var(--shadow-xl); animation:slideUp .3s ease; }
    .toast-success { background:#059669; color:white; }
    .toast-error   { background:#dc2626; color:white; }
    .booking-card { border-left:4px solid; border-radius:12px; transition:all .2s; background:white; border-top:1px solid var(--color-border); border-right:1px solid var(--color-border); border-bottom:1px solid var(--color-border); }
    .booking-card:hover { transform:translateX(3px); box-shadow:var(--shadow-lg); }
    .room-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:.75rem; font-weight:500; }
    .btn-primary { background:var(--color-brand); color:white; font-weight:600; border-radius:10px; font-size:.875rem; transition:background .2s; }
    .btn-primary:hover { background:var(--color-brand-strong); }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
  </style>
</head>
<body>
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div class="sidebar w-64 flex-shrink-0 flex flex-col p-5">
    <div class="mb-7 mt-1">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
             style="background:rgba(20,71,230,.35);border:1px solid rgba(190,219,255,.25)">
          <svg class="w-5 h-5" style="color:#bedbff" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </div>
        <div>
          <div class="text-white font-bold text-sm">Sale Riunioni</div>
          <div class="text-xs" style="color:rgba(190,219,255,.65)">Prenotazioni</div>
        </div>
      </div>
    </div>
    <div class="rounded-xl p-3 mb-5" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1)">
      <div class="text-white text-sm font-semibold" id="user-name">—</div>
      <div class="text-xs mt-0.5" style="color:rgba(190,219,255,.65)" id="user-email">—</div>
    </div>
    <nav class="flex flex-col gap-0.5 flex-1">
      <button onclick="showView('calendar')" id="nav-calendar" class="nav-item active text-left px-3 py-2.5 text-white text-sm flex items-center gap-3 font-medium">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Calendario
      </button>
      <button onclick="showView('my-bookings')" id="nav-my-bookings" class="nav-item text-left px-3 py-2.5 text-sm flex items-center gap-3 font-medium" style="color:rgba(190,219,255,.75)">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Le mie prenotazioni
      </button>
    </nav>
    <div class="mb-5">
      <div class="text-xs font-semibold mb-2 px-1" style="color:rgba(190,219,255,.5);letter-spacing:.07em">SALE</div>
      <div id="rooms-legend" class="flex flex-col gap-1"></div>
    </div>
    <div class="flex flex-col gap-1">
      <div id="admin-link-container" class="hidden">
        <a href="/admin.html" class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm font-medium transition-all" style="color:#fbbf24"
           onmouseover="this.style.background='rgba(255,255,255,.10)'" onmouseout="this.style.background=''">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Admin Panel
        </a>
      </div>
      <button onclick="doLogout()" class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm font-medium" style="color:rgba(190,219,255,.65)"
              onmouseover="this.style.background='rgba(255,255,255,.08)'" onmouseout="this.style.background=''">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Esci
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="flex-1 overflow-auto" style="background:#f3f4f6">
    <div id="view-calendar" class="p-6">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-xl font-bold" style="color:var(--color-text-heading);letter-spacing:-.02em">Calendario Prenotazioni</h1>
          <p class="text-sm mt-0.5" style="color:var(--color-text-body)">Clicca su un giorno o orario per prenotare una sala</p>
        </div>
        <button onclick="openBookingModal()" class="btn-primary px-5 py-2.5 flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Nuova Prenotazione
        </button>
      </div>
      <div class="card p-4 mb-4 flex flex-wrap gap-2 items-center">
        <span class="text-sm font-semibold mr-1" style="color:var(--color-text-body)">Filtra sala:</span>
        <button onclick="filterRoom('all')" id="filter-all"
          class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all"
          style="background:var(--color-brand);color:white">Tutte</button>
        <div id="room-filters" class="flex flex-wrap gap-2"></div>
      </div>
      <div class="card p-5"><div id="calendar"></div></div>
    </div>

    <div id="view-my-bookings" class="p-6 hidden">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-xl font-bold" style="color:var(--color-text-heading);letter-spacing:-.02em">Le mie prenotazioni</h1>
          <p class="text-sm mt-0.5" style="color:var(--color-text-body)">Gestisci le tue prenotazioni personali</p>
        </div>
        <button onclick="openBookingModal()" class="btn-primary px-5 py-2.5 flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Nuova Prenotazione
        </button>
      </div>
      <div id="my-bookings-list" class="flex flex-col gap-3"></div>
    </div>
  </div>
</div>

<!-- Modal: Nuova Prenotazione -->
<div id="booking-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
  <div class="modal-content bg-white rounded-2xl shadow-2xl w-full max-w-lg">
    <div class="flex items-center justify-between p-6 border-b" style="border-color:var(--color-border)">
      <h2 class="text-base font-bold" style="color:var(--color-text-heading)">Nuova Prenotazione</h2>
      <button onclick="closeBookingModal()" class="w-8 h-8 flex items-center justify-center rounded-lg" style="color:#9ca3af"
              onmouseover="this.style.background='#f3f4f6';this.style.color='#374151'" onmouseout="this.style.background='';this.style.color='#9ca3af'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-6 space-y-4">
      <div id="booking-error" class="hidden rounded-xl p-3 text-sm font-medium" style="background:#fef2f2;border:1px solid #fecaca;color:#dc2626"></div>
      <div>
        <label class="block text-xs font-semibold mb-1.5" style="color:var(--color-text-body);letter-spacing:.05em">TITOLO RIUNIONE *</label>
        <input type="text" id="b-title" placeholder="es. Meeting di team" class="input-field" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold mb-1.5" style="color:var(--color-text-body);letter-spacing:.05em">SALA *</label>
          <select id="b-room" class="input-field"><option value="">Seleziona sala…</option></select>
        </div>
        <div>
          <label class="block text-xs font-semibold mb-1.5" style="color:var(--color-text-body);letter-spacing:.05em">DATA *</label>
          <input type="date" id="b-date" class="input-field" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold mb-1.5" style="color:var(--color-text-body);letter-spacing:.05em">ORA INIZIO *</label>
          <input type="time" id="b-start" class="input-field" value="09:00" />
        </div>
        <div>
          <label class="block text-xs font-semibold mb-1.5" style="color:var(--color-text-body);letter-spacing:.05em">ORA FINE *</label>
          <input type="time" id="b-end" class="input-field" value="10:00" />
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold mb-1.5" style="color:var(--color-text-body);letter-spacing:.05em">NOTE (opzionale)</label>
        <textarea id="b-notes" placeholder="Informazioni aggiuntive…" rows="2" class="input-field resize-none"></textarea>
      </div>
    </div>
    <div class="flex gap-3 p-6 pt-0">
      <button onclick="closeBookingModal()" class="flex-1 border font-semibold py-2.5 rounded-xl text-sm" style="border-color:var(--color-border);color:var(--color-text-body)"
              onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background=''">Annulla</button>
      <button onclick="submitBooking()" id="submit-booking-btn" class="flex-1 btn-primary py-2.5">Prenota</button>
    </div>
  </div>
</div>

<!-- Modal: Dettaglio -->
<div id="detail-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
  <div class="modal-content bg-white rounded-2xl shadow-2xl w-full max-w-sm">
    <div class="p-6 border-b flex items-center justify-between" style="border-color:var(--color-border)">
      <h2 class="text-base font-bold" style="color:var(--color-text-heading)" id="detail-title">—</h2>
      <button onclick="closeDetailModal()" class="w-8 h-8 flex items-center justify-center rounded-lg" style="color:#9ca3af"
              onmouseover="this.style.background='#f3f4f6';this.style.color='#374151'" onmouseout="this.style.background='';this.style.color='#9ca3af'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-6 space-y-3" id="detail-body"></div>
    <div class="p-6 pt-0" id="detail-actions"></div>
  </div>
</div>

<script>
  // ── Supabase config ─────────────────────────────────────────────────────
  // ⚠️  Sostituisci con i tuoi valori da Supabase > Settings > API
  const SUPABASE_URL      = 'https://sjajyvhedybsvspzuuhh.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqYWp5dmhlZHlic3ZzcHp1dWhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NjUzMTIsImV4cCI6MjA5NzQ0MTMxMn0.LdY_mZRycnNzsxyhUAdOXMPJRuKJDePm9ioFyNrdK7A';
  // ────────────────────────────────────────────────────────────────────────

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let currentProfile = null;
  let rooms = [];
  let calendar;
  let activeRoomFilter = 'all';

  // ── Init ────────────────────────────────────────────────────────────────

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '/'; return; }

    currentUser = session.user;

    const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = profile;

    document.getElementById('user-name').textContent  = profile?.name  || currentUser.email;
    document.getElementById('user-email').textContent = currentUser.email;
    if (profile?.role === 'admin') document.getElementById('admin-link-container').classList.remove('hidden');

    await loadRooms();
    initCalendar();
    document.getElementById('b-date').value = new Date().toISOString().slice(0,10);
  }

  // Restituisce il token fresco ad ogni chiamata API
  async function getToken() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '/'; return null; }
    return session.access_token;
  }

  async function apiFetch(url, opts = {}) {
    const token = await getToken();
    if (!token) return;
    const res = await fetch(url, {
      ...opts,
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
    });
    if (res.status === 401) { doLogout(); return; }
    return res;
  }

  // ── Rooms ───────────────────────────────────────────────────────────────

  async function loadRooms() {
    const res = await apiFetch('/api/rooms');
    rooms = await res.json();

    document.getElementById('rooms-legend').innerHTML = rooms.map(r => `
      <div class="flex items-center gap-2 px-1 py-0.5">
        <div class="w-2 h-2 rounded-full flex-shrink-0" style="background:${r.color}"></div>
        <span class="text-xs" style="color:rgba(190,219,255,.75)">${r.name}</span>
        <span class="text-xs ml-auto" style="color:rgba(190,219,255,.4)">${r.capacity}p</span>
      </div>`).join('');

    document.getElementById('b-room').innerHTML = '<option value="">Seleziona sala…</option>' +
      rooms.map(r => `<option value="${r.id}">${r.name} (${r.capacity} posti)</option>`).join('');

    document.getElementById('room-filters').innerHTML = rooms.map(r => `
      <button onclick="filterRoom(${r.id})" id="filter-${r.id}"
        class="px-3 py-1.5 rounded-lg text-xs font-semibold border-2 transition-all"
        style="border-color:${r.color};color:${r.color}">${r.name}</button>`).join('');
  }

  function filterRoom(roomId) {
    activeRoomFilter = roomId;
    const allBtn = document.getElementById('filter-all');
    if (roomId === 'all') {
      allBtn.style.cssText = 'background:var(--color-brand);color:white';
    } else {
      allBtn.style.cssText = 'border:2px solid var(--color-border);color:var(--color-text-body)';
    }
    rooms.forEach(r => {
      const btn = document.getElementById(`filter-${r.id}`);
      if (!btn) return;
      btn.style.cssText = roomId === r.id
        ? `background:${r.color};color:white;border-color:${r.color}`
        : `border-color:${r.color};color:${r.color}`;
    });
    calendar.refetchEvents();
  }

  // ── Calendar ─────────────────────────────────────────────────────────────

  function initCalendar() {
    calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
      locale: 'it', initialView: 'dayGridMonth',
      headerToolbar: { left:'prev,next today', center:'title', right:'dayGridMonth,timeGridWeek,timeGridDay' },
      buttonText: { today:'Oggi', month:'Mese', week:'Settimana', day:'Giorno' },
      slotMinTime:'07:00:00', slotMaxTime:'21:00:00', allDaySlot:false, height:'auto',
      events: fetchCalendarEvents,
      eventClick: info => showEventDetail(info.event),
      dateClick: info => { openBookingModal(); document.getElementById('b-date').value = info.dateStr.substring(0,10); },
      eventTimeFormat: { hour:'2-digit', minute:'2-digit', meridiem:false, hour12:false }
    });
    calendar.render();
  }

  async function fetchCalendarEvents(info, success, failure) {
    try {
      const params = new URLSearchParams({ date_from: info.startStr.substring(0,10), date_to: info.endStr.substring(0,10) });
      if (activeRoomFilter !== 'all') params.append('room_id', activeRoomFilter);
      const res = await apiFetch(`/api/bookings?${params}`);
      const bookings = await res.json();
      success(bookings.map(b => ({
        id: b.id, title: `${b.room_name}: ${b.title}`,
        start: `${b.date}T${b.start_time}`, end: `${b.date}T${b.end_time}`,
        backgroundColor: b.room_color, borderColor: b.room_color,
        extendedProps: { booking: b }
      })));
    } catch (e) { failure(e); }
  }

  function showEventDetail(event) {
    const b = event.extendedProps.booking;
    document.getElementById('detail-title').textContent = b.title;
    document.getElementById('detail-body').innerHTML = `
      <div class="flex items-center gap-3">
        <div class="w-3 h-3 rounded-full flex-shrink-0" style="background:${b.room_color}"></div>
        <span class="text-sm font-semibold" style="color:var(--color-text-heading)">${b.room_name}</span>
      </div>
      <div class="flex items-center gap-3 text-sm" style="color:var(--color-text-body)">
        <svg class="w-4 h-4 flex-shrink-0" style="color:#9ca3af" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        ${formatDate(b.date)}
      </div>
      <div class="flex items-center gap-3 text-sm" style="color:var(--color-text-body)">
        <svg class="w-4 h-4 flex-shrink-0" style="color:#9ca3af" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        ${b.start_time.substring(0,5)} – ${b.end_time.substring(0,5)}
      </div>
      <div class="flex items-center gap-3 text-sm" style="color:var(--color-text-body)">
        <svg class="w-4 h-4 flex-shrink-0" style="color:#9ca3af" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        ${b.user_name}
      </div>
      ${b.notes ? `<div class="rounded-xl p-3 text-sm italic" style="background:#f9fafb;color:var(--color-text-body);border:1px solid var(--color-border)">${b.notes}</div>` : ''}`;

    const canDelete = currentUser?.id === b.user_id || currentProfile?.role === 'admin';
    document.getElementById('detail-actions').innerHTML = canDelete
      ? `<button onclick="deleteBooking(${b.id})" class="w-full font-semibold py-2.5 rounded-xl text-sm transition-all" style="background:#fef2f2;color:#dc2626;border:1px solid #fecaca" onmouseover="this.style.background='#fee2e2'" onmouseout="this.style.background='#fef2f2'">Elimina prenotazione</button>` : '';
    document.getElementById('detail-modal').classList.remove('hidden');
  }

  function closeDetailModal() { document.getElementById('detail-modal').classList.add('hidden'); }

  async function deleteBooking(id) {
    if (!confirm('Eliminare questa prenotazione?')) return;
    const res = await apiFetch(`/api/bookings/${id}`, { method: 'DELETE' });
    if (res.ok) {
      closeDetailModal(); calendar.refetchEvents();
      if (!document.getElementById('view-my-bookings').classList.contains('hidden')) loadMyBookings();
      showToast('Prenotazione eliminata', 'success');
    } else {
      const d = await res.json(); showToast(d.error || 'Errore', 'error');
    }
  }

  // ── My Bookings ──────────────────────────────────────────────────────────

  async function loadMyBookings() {
    const res = await apiFetch('/api/bookings/mine');
    const bookings = await res.json();
    const container = document.getElementById('my-bookings-list');
    if (bookings.length === 0) {
      container.innerHTML = `<div class="card p-12 text-center"><div class="text-4xl mb-3">📅</div><div class="font-semibold" style="color:var(--color-text-heading)">Nessuna prenotazione</div><div class="text-sm mt-1" style="color:var(--color-text-body)">Crea la tua prima prenotazione!</div></div>`;
      return;
    }
    const today = new Date().toISOString().slice(0,10);
    const future = bookings.filter(b => b.date >= today);
    const past   = bookings.filter(b => b.date < today);
    let html = '';
    if (future.length > 0) { html += `<div class="text-xs font-semibold uppercase tracking-widest mb-2 mt-1" style="color:var(--color-text-body)">Prossime</div>`; html += future.map(b => bookingCard(b, true)).join(''); }
    if (past.length > 0)   { html += `<div class="text-xs font-semibold uppercase tracking-widest mb-2 mt-4" style="color:var(--color-text-body)">Passate</div>`;   html += past.map(b => bookingCard(b, false)).join(''); }
    container.innerHTML = html;
  }

  function bookingCard(b, canDelete) {
    return `<div class="booking-card p-4" style="border-left-color:${b.room_color}">
      <div class="flex items-start justify-between">
        <div class="flex-1">
          <div class="font-semibold text-sm" style="color:var(--color-text-heading)">${b.title}</div>
          <div class="flex flex-wrap items-center gap-2 mt-2">
            <span class="room-badge" style="background:${b.room_color}18;color:${b.room_color}"><span class="w-1.5 h-1.5 rounded-full" style="background:${b.room_color}"></span>${b.room_name}</span>
            <span class="text-xs" style="color:var(--color-text-body)">${formatDate(b.date)}</span>
            <span class="text-xs" style="color:var(--color-text-body)">${b.start_time.substring(0,5)} – ${b.end_time.substring(0,5)}</span>
          </div>
          ${b.notes ? `<div class="text-xs mt-1.5 italic" style="color:#9ca3af">${b.notes}</div>` : ''}
        </div>
        ${canDelete ? `<button onclick="deleteBooking(${b.id})" class="ml-3 flex-shrink-0" style="color:#d1d5db" onmouseover="this.style.color='#dc2626'" onmouseout="this.style.color='#d1d5db'"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>` : ''}
      </div></div>`;
  }

  // ── Booking Modal ────────────────────────────────────────────────────────

  function openBookingModal() { document.getElementById('booking-error').classList.add('hidden'); document.getElementById('booking-modal').classList.remove('hidden'); }
  function closeBookingModal() { document.getElementById('booking-modal').classList.add('hidden'); }

  async function submitBooking() {
    const title = document.getElementById('b-title').value.trim();
    const room_id = document.getElementById('b-room').value;
    const date = document.getElementById('b-date').value;
    const start_time = document.getElementById('b-start').value;
    const end_time = document.getElementById('b-end').value;
    const notes = document.getElementById('b-notes').value.trim();
    const errEl = document.getElementById('booking-error');
    errEl.classList.add('hidden');
    if (!title || !room_id || !date || !start_time || !end_time) { errEl.textContent='Compila tutti i campi obbligatori'; errEl.classList.remove('hidden'); return; }
    const btn = document.getElementById('submit-booking-btn');
    btn.textContent = 'Prenotazione in corso…'; btn.disabled = true;
    try {
      const res = await apiFetch('/api/bookings', { method:'POST', body: JSON.stringify({ room_id:parseInt(room_id), title, date, start_time, end_time, notes }) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      closeBookingModal(); calendar.refetchEvents();
      if (!document.getElementById('view-my-bookings').classList.contains('hidden')) loadMyBookings();
      showToast('Prenotazione creata! 🎉','success');
      document.getElementById('b-title').value = ''; document.getElementById('b-notes').value = '';
    } catch (err) { errEl.textContent = err.message; errEl.classList.remove('hidden'); }
    finally { btn.textContent='Prenota'; btn.disabled=false; }
  }

  // ── Navigation ───────────────────────────────────────────────────────────

  function showView(view) {
    ['calendar','my-bookings'].forEach(v => {
      document.getElementById(`view-${v}`).classList.toggle('hidden', v !== view);
      const nav = document.getElementById(`nav-${v}`);
      if (v === view) { nav.classList.add('active'); nav.style.color='white'; }
      else { nav.classList.remove('active'); nav.style.color='rgba(190,219,255,.75)'; }
    });
    if (view === 'my-bookings') loadMyBookings();
    if (view === 'calendar') setTimeout(() => calendar.updateSize(), 100);
  }

  // ── Utils ────────────────────────────────────────────────────────────────

  function formatDate(d) { return new Date(d+'T12:00:00').toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'long',year:'numeric'}); }

  function showToast(msg, type='success') {
    const el = document.createElement('div'); el.className=`toast toast-${type}`; el.textContent=msg;
    document.body.appendChild(el); setTimeout(()=>el.remove(),3500);
  }

  async function doLogout() { await sb.auth.signOut(); window.location.href='/'; }

  document.getElementById('booking-modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeBookingModal(); });
  document.getElementById('detail-modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeDetailModal(); });

  init();
</script>
</body>
</html>
