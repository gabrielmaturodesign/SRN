<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meeting Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <svg
            class="sidebar-logo-icon"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
          <span class="sidebar-logo-text">Meeting Room</span>
        </div>
        <nav class="nav">
          <button class="nav-item active" id="nav-calendar">
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
              />
            </svg>
            Calendario
          </button>
          <button class="nav-item" id="nav-bookings">
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
              />
            </svg>
            Le mie prenotazioni
          </button>
        </nav>
        <div class="sidebar-bottom">
          <button class="nav-item hidden" id="nav-admin">
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              />
            </svg>
            Pannello Admin
          </button>
        </div>
      </aside>

      <!-- Main -->
      <div class="main">
        <!-- Topbar -->
        <div class="topbar">
          <div class="topbar-left" id="topbar-left">
            <div class="nav-arrows">
              <button
                class="arrow-btn"
                id="btn-prev"
                aria-label="Mese precedente"
              >
                <svg
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 19l-7-7 7-7"
                  />
                </svg>
              </button>
              <button
                class="arrow-btn"
                id="btn-next"
                aria-label="Mese successivo"
              >
                <svg
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M9 5l7 7-7 7"
                  />
                </svg>
              </button>
            </div>
            <span class="current-month" id="month-label">—</span>
            <button class="today-btn" id="btn-today">Today</button>
          </div>
          <div class="topbar-right">
            <div class="view-tabs" id="view-tabs">
              <button class="view-tab" data-cal-view="timeGridDay">Day</button>
              <button class="view-tab" data-cal-view="timeGridWeek">
                Week
              </button>
              <button class="view-tab active" data-cal-view="dayGridMonth">
                Month
              </button>
              <button class="view-tab" data-cal-view="listWeek">List</button>
            </div>
            <button class="new-btn" id="btn-new-booking">
              <svg
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 4v16m8-8H4"
                />
              </svg>
              Nuova Prenotazione
            </button>
            <div class="user-area">
              <div class="avatar-circle" id="user-avatar" aria-hidden="true">
                ?
              </div>
              <button class="logout-btn" id="btn-logout">
                <svg
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                  />
                </svg>
                Logout
              </button>
            </div>
          </div>
        </div>

        <!-- Calendar view -->
        <div id="view-calendar" class="cal-wrap">
          <div id="calendar"></div>
        </div>

        <!-- My bookings view -->
        <div id="view-my-bookings" class="bookings-wrap hidden">
          <div id="bookings-list"></div>
        </div>
      </div>
    </div>

    <!-- Modal: Nuova prenotazione -->
    <div
      id="booking-modal"
      class="overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="booking-modal-title"
    >
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="booking-modal-title"
            >Nuova Prenotazione</span
          >
          <button
            class="modal-close"
            id="close-booking-modal"
            aria-label="Chiudi"
          >
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div id="booking-error" class="err-msg hidden"></div>
          <div class="field">
            <label class="field-label" for="b-title">Titolo riunione *</label>
            <input
              type="text"
              id="b-title"
              class="input"
              placeholder="es. Stand-up mattutino"
            />
          </div>
          <div class="field-row">
            <div class="field">
              <label class="field-label" for="b-room">Sala *</label>
              <select id="b-room" class="input">
                <option value="">Seleziona sala…</option>
              </select>
            </div>
            <div class="field">
              <label class="field-label" for="b-date">Data *</label>
              <input type="date" id="b-date" class="input" />
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label class="field-label" for="b-start">Ora inizio *</label>
              <input type="time" id="b-start" class="input" value="09:00" />
            </div>
            <div class="field">
              <label class="field-label" for="b-end">Ora fine *</label>
              <input type="time" id="b-end" class="input" value="10:00" />
            </div>
          </div>
          <div class="field">
            <label class="field-label" for="b-notes">Note</label>
            <textarea
              id="b-notes"
              class="input"
              rows="2"
              placeholder="Informazioni aggiuntive…"
            ></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="cancel-booking-btn">Annulla</button>
          <button class="btn-confirm" id="submit-btn">Prenota</button>
        </div>
      </div>
    </div>

    <!-- Modal: Dettaglio evento -->
    <div
      id="detail-modal"
      class="overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="detail-title"
    >
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="detail-title">—</span>
          <button
            class="modal-close"
            id="close-detail-modal"
            aria-label="Chiudi"
          >
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <div class="modal-body" id="detail-body"></div>
        <div class="modal-footer" id="detail-footer"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
